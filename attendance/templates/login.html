{% load static %}

<!DOCTYPE html>
<html>
<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{% static 'css/style.css' %}">

</head>

<body>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card p-4">

                <h2 class="text-center mb-4">
                    HGL Admin Login
                </h2>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <label>Username</label>

                    <input
                        type="text"
                        name="username"
                        class="form-control mb-3"
                    >

                    <label>Password</label>

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-3"
                    >

                    <button
                        type="submit"
                        class="btn btn-primary w-100"
                    >
                        Login
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
