{% extends 'base.html' %}

{% block content %}

<h2>Add Student</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="POST" class="card p-4 mt-3">

    {% csrf_token %}

    <label>Roll Number</label>
    <input type="text" name="roll_no" class="form-control mb-3" required>

    <label>Name</label>
    <input type="text" name="name" class="form-control mb-3" required>

    <label>Email</label>
    <input type="email" name="email" class="form-control mb-3" required>

    <label>Phone</label>
    <input type="text" name="phone" class="form-control mb-3" required>

    <label>Department</label>
    <input type="text" name="department" class="form-control mb-3" required>

    <button type="submit" class="btn btn-success">
        Save Student
    </button>

</form>

<br>

<a href="{% url 'student_list' %}" class="btn btn-secondary">
    Back
</a>

{% endblock %}
