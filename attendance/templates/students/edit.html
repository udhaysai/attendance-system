{% extends 'base.html' %}

{% block content %}

<h2>Edit Student</h2>

<form method="POST" class="card p-4 mt-3">

    {% csrf_token %}

    <label>Roll Number</label>
    <input type="text" name="roll_no" value="{{ student.roll_no }}" class="form-control mb-3">

    <label>Name</label>
    <input type="text" name="name" value="{{ student.name }}" class="form-control mb-3">

    <label>Email</label>
    <input type="email" name="email" value="{{ student.email }}" class="form-control mb-3">

    <label>Phone</label>
    <input type="text" name="phone" value="{{ student.phone }}" class="form-control mb-3">

    <label>Department</label>
    <input type="text" name="department" value="{{ student.department }}" class="form-control mb-3">

    <button type="submit" class="btn btn-success">
        Update Student
    </button>

</form>

<br>

<a href="{% url 'student_list' %}" class="btn btn-secondary">
    Back
</a>

{% endblock %}
